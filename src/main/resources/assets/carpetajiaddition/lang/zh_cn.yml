    red: "红色"
    light_purple: "浅紫色"
    yellow: "黄色"
    white: "白色"
  command:
    mods:
      list:
        hover: "点击查看详情"
      mods:
        feedback:
          type: "类型: {0}"
          id: "ID: {0}"
          version: "版本: {0}"
          environment:
            client: "运行环境: 客户端"
            server: "运行环境: 服务器"
            universal: "运行环境: 客户端和服务器"
