  carpet:
    category:
      CAA: "CAA"
      recipe: "Recipe"
    rule:
      glowingHopperMinecart:
        desc: "When a hopper minecart is locked, it glows red; otherwise, it glows white."
      sitOnTheGround:
        desc: "Sit on the ground by crouching multiple times.。"
      lockAllHopper:
        desc: "All hoppers will be locked, regardless of whether they receive a redstone signal."
      keepOpeningVault:
        desc: "The same player can open the same vault repeatedly."
      lockAllHopperMinecart:
        desc: "All hopper minecarts will be locked, regardless of whether the rail beneath them is a powered activator rail."
      cactusWrench:
        desc: "When holding a cactus in the off-hand, placed blocks face the opposite direction."
      tameHorse:
        desc: "You can tame horses with 100% success."
      commandFollow:
        desc: "Can use the /follow command."
      commandMods:
        desc: "Can use the /mods command."
      safeMagmaBlock:
        desc: "You no longer take damage when standing on magma blocks."
      toughTurtleEgg:
        desc: "Turtle eggs cannot be broken by stepping on them."
      removeEnderPearlDamage:
        desc: "The ender Portal pearl will not cause damage after transmission"
      betterLogCommand:
        desc: "After the server restarts, players do not need to use the log command again"

      #-----------------
      #The rules below are recipe rules.
      #-----------------

      dragonEggRecipe:
        desc: "Added a proper recipe for the dragon egg."
      dragonBreathRecipe:
        desc: "Added a proper recipe for dragon's breath."
